{% extends "base.html" %}

{% block title %}Error | AI Resume Analyzer{% endblock %}

{% block content %}
<section class="mx-auto max-w-2xl rounded-lg border border-zinc-200 bg-white p-8 text-center shadow-sm">
  <p class="text-sm font-medium text-zinc-500">Error {{ status_code }}</p>
  <h1 class="mt-3 text-3xl font-semibold tracking-tight">We could not process the request.</h1>
  <p class="mt-4 leading-7 text-zinc-600">{{ message }}</p>
  <a href="/" class="mt-6 inline-flex rounded-md bg-zinc-950 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-800">Return home</a>
</section>
{% endblock %}
