{% extends "base.html" %}

{% block title %}Error | AI Resume Analyzer{% endblock %}

{% block content %}
<section class="glass-card" style="max-width: 600px; margin: 4rem auto; text-align: center;">
  <p class="score-label" style="margin-bottom: 0.5rem; color: var(--error);">Error {{ status_code }}</p>
  <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 1rem;">Request Failed.</h1>
  <p class="card-text" style="margin-bottom: 2rem;">{{ message }}</p>
  <a href="/" class="btn-primary">Return home</a>
</section>
{% endblock %}
