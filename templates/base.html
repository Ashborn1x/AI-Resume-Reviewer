<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Resume Analyzer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="bg-glow-alt"></div>
    
    <header class="app-header">
      <div class="container header-inner">
        <a href="/" class="logo-link">AI Resume Analyzer</a>
        <span class="header-badge">FastAPI + AWS Bedrock</span>
      </div>
    </header>

    <main class="container main-content animate-fade-in">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='js/app.js') }}"></script>
  </body>
</html>
