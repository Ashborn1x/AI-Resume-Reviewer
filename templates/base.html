<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Resume Analyzer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  </head>
  <body class="min-h-screen bg-zinc-50 text-zinc-950">
    <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-5 py-8">
      <header class="mb-10 flex items-center justify-between border-b border-zinc-200 pb-5">
        <a href="/" class="text-lg font-semibold tracking-tight">AI Resume Analyzer</a>
        <span class="text-sm text-zinc-500">FastAPI + Local LLM</span>
      </header>
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='js/app.js') }}"></script>
  </body>
</html>
